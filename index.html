<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>成分能不能一起涂？一张图告诉你</title>
<script src="https://unpkg.com/roughjs@4.6.6/bundled/rough.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans SC', sans-serif;
  background: #FFF8F0;
  overflow-x: hidden;
  color: #3D3D3D;
  -webkit-tap-highlight-color: transparent;
}
#app {
  width: 100%;
  max-width: 414px;
  margin: 0 auto;
  padding: 12px;
  position: relative;
}
canvas {
  display: block;
  margin: 0 auto;
  cursor: pointer;
  transition: opacity 0.5s ease;
  width: 100%;
}
.controls {
  position: fixed;
  top: 12px;
  right: 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  z-index: 100;
}
.ctrl-btn {
  padding: 6px 12px;
  border: 2px solid #E8D5C4;
  border-radius: 20px;
  background: rgba(255,255,255,0.95);
  cursor: pointer;
  font-size: 12px;
  font-family: 'Noto Sans SC', sans-serif;
  transition: all 0.3s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.ctrl-btn:hover { background: #FFF0E6; border-color: #D4A574; }
.ctrl-btn.active { background: #F5D5C0; border-color: #D4A574; }
.progress-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 4px;
  background: #F0E6DC;
  z-index: 100;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #E8A0BF, #B8A9C9);
  transition: width 0.5s ease;
  width: 0%;
}
.narration {
  position: fixed;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.95);
  padding: 10px 16px;
  border-radius: 20px;
  font-size: 13px;
  line-height: 1.6;
  max-width: 90vw;
  text-align: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  z-index: 100;
  display: none;
  border: 1px solid #E8D5C4;
  transition: opacity 0.4s;
}
.scene-dots {
  position: fixed;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 8px;
  z-index: 100;
}
.scene-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #E0D0C0;
  transition: all 0.3s;
  cursor: pointer;
}
.scene-dot.active {
  background: linear-gradient(135deg, #E8A0BF, #B8A9C9);
  transform: scale(1.3);
}
.scene-dot:hover { background: #D4A574; }
</style>
</head>
<body>

<div id="app">
  <canvas id="mainCanvas"></canvas>
  <div class="narration" id="narration"></div>
</div>

<div class="controls">
  <button class="ctrl-btn active" id="btnAuto" onclick="setMode('auto')">▶ 自动</button>
  <button class="ctrl-btn" id="btnManual" onclick="setMode('manual')">✋ 手动</button>
  <button class="ctrl-btn" id="btnTTS" onclick="toggleTTS()">🔊</button>
  <button class="ctrl-btn" id="btnRestart" onclick="restart()">↺</button>
</div>

<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div class="scene-dots" id="sceneDots"></div>

<script>
// ============ DATA ============
const ingredients = [
  { id: 'vc', name: '原型VC', en: 'Vitamin C', cat: '美白', color: '#FFB6C1', desc: '强效美白抗氧化，需要低pH环境(pH<3.5)才能有效吸收。怕光怕氧化，建议晚上使用。', skin: '耐受肌', caution: '原型VC浓度15%已足够，过高徒增刺激' },

  { id: 'cer', name: '神经酰胺', en: 'Ceramide', cat: '修复', color: '#A8D8EA', desc: '构成皮肤屏障的关键脂质，修复受损屏障、锁住水分。敏感肌救星。', skin: '所有肤质（尤其敏感肌）', caution: '搭配胆固醇和脂肪酸效果更佳' },

  { id: 'vcd', name: 'VC衍生物', en: 'VC Derivatives', cat: '美白', color: '#FFB6C1', desc: 'VC的温和替代品（AA2G、VC-IP等），不需要低pH环境，白天也能用。', skin: '所有肤质', caution: '效果比原型VC温和缓慢，但更稳定方便' },

const relations = [
  { from: 'nia', to: 'ret', type: 'compatible', label: '✅ 神仙CP', detail: '烟酰胺降低A醇刺激，协同抗老美白' },
  { from: 'nia', to: 'tra', type: 'compatible', label: '✅ 美白加倍', detail: '双通路抑制黑色素，协同淡斑' },
  { from: 'pxy', to: 'pep', type: 'compatible', label: '✅ 抗老黄金组合', detail: '玻色因撑底+胜肽加固，互补抗老' },
  { from: 'pep', to: 'cer', type: 'compatible', label: '✅ 修复+抗老', detail: '抗老同时修复屏障，敏感肌友好' },
  { from: 'ha', to: 'nia', type: 'compatible', label: '✅ 百搭', detail: '玻尿酸与所有成分兼容' },
  { from: 'ha', to: 'ret', type: 'compatible', label: '✅ 百搭', detail: '保湿修复，降低刺激' },
  { from: 'ha', to: 'vc', type: 'compatible', label: '✅ 百搭', detail: '基础保湿不冲突' },
  { from: 'ha', to: 'aha', type: 'compatible', label: '✅ 百搭', detail: '酸后保湿必备' },
  { from: 'cer', to: 'ret', type: 'compatible', label: '✅ 降刺激', detail: '神经酰胺修复屏障，减轻A醇脱皮' },
  { from: 'vc', to: 'tra', type: 'compatible', label: '✅ 美白协同', detail: '不同通路抑制黑色素' },
  { from: 'vc', to: 'nia', type: 'separate', label: '⚠️ 建议分开', detail: '高浓度下烟酰胺可能转化为烟酸刺激皮肤；低浓度可同用' },
  { from: 'nia', to: 'aha', type: 'separate', label: '⚠️ 间隔30min', detail: '烟酰胺在强酸环境中可能分解为烟酸' },
  { from: 'nia', to: 'bha', type: 'separate', label: '⚠️ 间隔30min', detail: '同上，避免低pH环境直接接触' },
  { from: 'ret', to: 'vc', type: 'separate', label: '⚠️ 早C晚A', detail: '两者都是活性成分，分开时间使用效果更佳' },
  { from: 'aha', to: 'bha', type: 'conflict', label: '❌ 双重刺激', detail: '两种酸叠加去角质，屏障损伤风险加倍' },
  { from: 'ret', to: 'aha', type: 'conflict', label: '❌ 双重刺激', detail: 'A醇促代谢+果酸去角质，双重剥脱伤屏障' },
  { from: 'ret', to: 'bha', type: 'conflict', label: '❌ 双重刺激', detail: '双重刺激性成分叠加，容易烂脸' }
];

const narrationScript = [
  "闺蜜们！你有没有过这种经历——买了一堆精华，涂完发现脸红了？今天我用一张图，帮你搞懂护肤成分到底能不能一起涂！",
  "先认识一下常见的12位主角。美白组的VC、烟酰胺、传明酸；酸类的果酸和水杨酸；抗老三巨头A醇、胜肽、玻色因；还有修复担当神经酰胺、保湿万能的玻尿酸，别忘了防晒！",

  "玻尿酸是万能百搭选手！它跟谁都不打架，放心叠。神经酰胺搭配A醇也是绝配，帮你把A醇的刺激拉下来一个档次。",

  "这张成分关系图建议截图收藏！你在搭配成分时踩过什么坑？评论区告诉我！关注我，程序员用UML讲美妆，下一期更精彩！"
];

// ============ STATE ============
const TOTAL_SCENES = 7;
let canvas, ctx, rc;
let W, H, dpr;
let currentScene = -1;
let autoMode = true;
let ttsEnabled = true;
let animTimer = null;
let started = false;
let zhVoice = null;
let animFrame = null;
let transitioning = false;
let pendingScene = -1;

let sceneAnim = {
  items: [],
  startTime: 0,
  lineProgress: 0,
  lines: [],
  labels: [],
  bgTint: null,
};

// ============ MOBILE LAYOUT CONSTANTS ============
const BOX_W = 100, BOX_H = 55;
const GAP = 12;

// ============ SCENE LAYOUTS ============
function getSceneLayout(scene) {
  const pad = 16;

  if (scene === 1) {
    // Vertical: groups stacked top to bottom
    const groups = [
      { label: '美白组', ids: ['vc', 'nia', 'tra'], color: '#FFB6C1' },
      { label: '酸类 + 抗老', ids: ['aha', 'bha', 'ret'], color: '#FF6B6B' },
      { label: '修复 · 保湿 · 防护', ids: ['pep', 'pxy', 'cer', 'ha', 'vcd', 'sun'], color: '#98D8C8' },
    ];
    const positions = {};
    let y = 50; // start y
    groups.forEach(g => {
      const rows = Math.ceil(g.ids.length / 3);
      g.startY = y;
      // group label
      y += 22;
      // ingredient rows
      g.ids.forEach((id, i) => {
        const row = Math.floor(i / 3);
        const col = i % 3;
        const rowWidth = Math.min(g.ids.length - row * 3, 3);
        const totalW = rowWidth * BOX_W + (rowWidth - 1) * GAP;
        const startX = (W - totalW) / 2;
        positions[id] = {
          x: startX + col * (BOX_W + GAP) + BOX_W / 2,
          y: y + row * (BOX_H + GAP) + BOX_H / 2,
          group: g.label,
          groupColor: g.color
        };
      });
      y += rows * (BOX_H + GAP) + 20;
    });
    return { type: 'ingredients', positions, groups, height: Math.max(400, Math.min(800, y + 20)) };
  }

  if (scene === 2) {
    // Compatible pairs - vertical list
    const compatPairs = [
      { ids: ['nia', 'ret'], label: '✅ 神仙CP', detail: '协同抗老美白' },
      { ids: ['pxy', 'pep'], label: '✅ 抗老黄金组合', detail: '互补抗老' },
      { ids: ['nia', 'tra'], label: '✅ 美白加倍', detail: '双通路淡斑' },
      { ids: ['vc', 'tra'], label: '✅ 美白协同', detail: '不同通路' },
      { ids: ['cer', 'ret'], label: '✅ 降刺激', detail: '修复屏障减轻脱皮' },
    ];
    const positions = {};
    let y = 60;
    compatPairs.forEach((p, i) => {
      const cx = W / 2;
      const rowH = BOX_H + 24;
      positions[p.ids[0]] = { x: cx - BOX_W - 20, y: y };
      positions[p.ids[1]] = { x: cx + BOX_W + 20, y: y };
      y += rowH;
    });
    return { type: 'compatible', positions, pairs: compatPairs, height: Math.max(400, Math.min(800, y + 20)) };
  }

  if (scene === 3) {
    // HA hub - vertical star layout
    const center = { x: W / 2, y: 80 };
    const aroundIds = ['vc', 'nia', 'ret', 'aha', 'tra', 'bha', 'pep', 'pxy'];
    const positions = { ha: center };
    let y = 160;
    aroundIds.forEach((id, i) => {
      positions[id] = { x: W / 2, y: y };
      y += 44;
    });
    return { type: 'hub', positions, hubId: 'ha', aroundIds, height: Math.max(400, Math.min(800, y + 30)) };
  }

  if (scene === 4) {
    // Yellow warnings - vertical list
    const warnPairs = [
      { ids: ['vc', 'nia'], label: '⚠️ 建议分开', detail: '高浓度下可能刺激，敏感肌早晚分开' },
      { ids: ['ret', 'vc'], label: '⚠️ 早C晚A', detail: '分开时间使用效果更佳' },
      { ids: ['nia', 'aha'], label: '⚠️ 间隔30min', detail: '烟酰胺在强酸中可能分解' },
      { ids: ['nia', 'bha'], label: '⚠️ 间隔30min', detail: '避免低pH环境直接接触' },
    ];
    const positions = {};
    let y = 60;
    warnPairs.forEach((p, i) => {
      const cx = W / 2;
      positions[p.ids[0]] = { x: cx - BOX_W - 20, y: y };
      positions[p.ids[1]] = { x: cx + BOX_W + 20, y: y };
      y += BOX_H + 36;
    });
    return { type: 'warning', positions, pairs: warnPairs, height: Math.max(400, Math.min(800, y + 20)) };
  }

  if (scene === 5) {
    // Red conflicts - vertical list
    const conflictPairs = [
      { ids: ['aha', 'bha'], label: '❌ 双重刺激', detail: '双重去角质，屏障损伤加倍' },
      { ids: ['ret', 'aha'], label: '❌ 双重刺激', detail: '双重剥脱伤屏障' },
      { ids: ['ret', 'bha'], label: '❌ 双重刺激', detail: '双重刺激容易烂脸' },
    ];
    const positions = {};
    let y = 70;
    conflictPairs.forEach((p, i) => {
      const cx = W / 2;
      positions[p.ids[0]] = { x: cx - BOX_W - 20, y: y };
      positions[p.ids[1]] = { x: cx + BOX_W + 20, y: y };
      y += BOX_H + 50;
    });
    return { type: 'conflict', positions, pairs: conflictPairs, height: Math.max(400, Math.min(800, y + 20)) };
  }

  if (scene === 6) {
    return { type: 'summary', height: 720 };
  }

  return { type: 'empty', height: 400 };
}

// ============ INIT ============
function init() {
  canvas = document.getElementById('mainCanvas');
  ctx = canvas.getContext('2d');
  rc = rough.canvas(canvas);

  resize();
  window.addEventListener('resize', () => { resize(); renderCurrentScene(); });

  const dotsEl = document.getElementById('sceneDots');
  for (let i = 0; i < TOTAL_SCENES; i++) {
    const dot = document.createElement('div');
    dot.className = 'scene-dot';
    dot.onclick = () => goToScene(i);
    dotsEl.appendChild(dot);
  }

  if (window.speechSynthesis) {
    function loadVoices() {
      const voices = speechSynthesis.getVoices();
      zhVoice = voices.find(v => v.lang === 'zh-CN' && v.localService)
        || voices.find(v => v.lang.startsWith('zh') && v.localService)
        || voices.find(v => v.lang === 'zh-CN')
        || voices.find(v => v.lang.startsWith('zh'))
        || null;
    }
    loadVoices();
    speechSynthesis.onvoiceschanged = loadVoices;
  }

  setCanvasSize(420);
  drawCover();
}

function resize() {
  dpr = window.devicePixelRatio || 1;
  const container = document.getElementById('app');
  W = Math.min(container.clientWidth - 24, 390);
}

function setCanvasSize(h) {
  H = h;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

// ============ COVER ============
function drawCover() {
  setCanvasSize(420);
  ctx.clearRect(0, 0, W, H);
  drawBg('#FFF8F0');

  ctx.textAlign = 'center';
  ctx.fillStyle = '#6B4E71';
  ctx.font = 'bold 22px "ZCOOL XiaoWei", serif';
  ctx.fillText('成分能不能一起涂？', W / 2, 140);

  ctx.fillStyle = '#A09090';
  ctx.font = '13px "Noto Sans SC", sans-serif';
  ctx.fillText('一张图告诉你 · 护肤成分兼容性全解析', W / 2, 170);

  const btnW = 160, btnH = 48, btnX = W / 2 - btnW / 2, btnY = 230;
  const grad = ctx.createLinearGradient(btnX, btnY, btnX + btnW, btnY + btnH);
  grad.addColorStop(0, '#E8A0BF');
  grad.addColorStop(1, '#B8A9C9');

  rc.rectangle(btnX, btnY, btnW, btnH, {
    fill: '#D8A0BF',
    fillStyle: 'solid',
    stroke: '#B889B9',
    strokeWidth: 2,
    roughness: 1.5
  });
  ctx.save();
  ctx.globalAlpha = 0.6;
  ctx.fillStyle = grad;
  roundRectFill(ctx, btnX + 2, btnY + 2, btnW - 4, btnH - 4, 24);
  ctx.restore();

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 15px "Noto Sans SC", sans-serif';
  ctx.fillText('▶  开始讲解', W / 2, btnY + 30);

  ctx.fillStyle = '#C0B0A0';
  ctx.font = '11px "Noto Sans SC", sans-serif';
  ctx.fillText('程序员用UML讲美妆系列 📐', W / 2, 340);

  drawDecoCircles();
}

function drawDecoCircles() {
  const colors = ['#FFB6C140', '#DDA0DD40', '#98D8C840', '#B8A9C940'];
  const positions = [[40, 70], [W - 40, 60], [50, 350], [W - 50, 340]];
  positions.forEach((p, i) => {
    rc.circle(p[0], p[1], 25 + i * 8, {
      stroke: colors[i],
      fill: colors[i],
      fillStyle: 'solid',
      roughness: 2
    });
  });
}

// ============ SCENE TRANSITIONS ============
function startPresentation() {
  if (started) return;
  started = true;
  if (window.speechSynthesis) {
    speechSynthesis.cancel();
    const unlock = new SpeechSynthesisUtterance('');
    unlock.volume = 0;
    speechSynthesis.speak(unlock);
  }
  canvas.removeEventListener('click', startPresentation);
  goToScene(0);
}

setTimeout(() => {
  canvas.addEventListener('click', function coverClick(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = W / rect.width;
    const scaleY = H / rect.height;
    const mx = (e.clientX - rect.left) * scaleX;
    const my = (e.clientY - rect.top) * scaleY;
    if (mx > W / 2 - 80 && mx < W / 2 + 80 && my > 230 && my < 280) {
      canvas.removeEventListener('click', coverClick);
      startPresentation();
    }
  });
}, 100);

function goToScene(scene) {
  if (transitioning || scene === currentScene) return;
  if (scene < 0 || scene >= TOTAL_SCENES) return;

  clearTimeout(animTimer);
  if (animFrame) cancelAnimationFrame(animFrame);

  pendingScene = scene;
  transitioning = true;

  canvas.style.opacity = '0';

  setTimeout(() => {
    currentScene = scene;
    updateSceneDots();
    updateProgress();
    setupScene(scene);
    canvas.style.opacity = '1';
    transitioning = false;

    const nar = document.getElementById('narration');
    if (scene < narrationScript.length) {
      nar.style.display = 'block';
      nar.textContent = narrationScript[scene];
    }

    if (ttsEnabled && scene < narrationScript.length) {
      speak(narrationScript[scene]);
    } else if (autoMode && scene < TOTAL_SCENES - 1) {
      animTimer = setTimeout(() => goToScene(scene + 1), 5000);
    }
  }, 500);
}

function setupScene(scene) {
  const layout = getSceneLayout(scene);
  setCanvasSize(layout.height);

  sceneAnim = { items: [], startTime: performance.now(), lineProgress: 0, lines: [], labels: [], bgTint: null };

  if (layout.type === 'ingredients') {
    const allIds = Object.keys(layout.positions);
    allIds.forEach((id, i) => {
      sceneAnim.items.push({
        type: 'ingredient', id,
        delay: i * 100,
        pos: layout.positions[id],
        done: false
      });
    });
    layout.groups.forEach((g) => {
      const rowWidth = Math.min(g.ids.length, 3);
      const totalW = rowWidth * BOX_W + (rowWidth - 1) * GAP;
      sceneAnim.items.push({
        type: 'groupLabel', label: g.label, color: g.color,
        x: W / 2,
        y: g.startY + 14,
        delay: 0,
        done: false
      });
    });
    animateScene();
  }

  if (layout.type === 'compatible' || layout.type === 'warning' || layout.type === 'conflict') {
    const isWarning = layout.type === 'warning';
    const isConflict = layout.type === 'conflict';
    if (isWarning) sceneAnim.bgTint = 'rgba(255,200,50,0.06)';
    if (isConflict) sceneAnim.bgTint = 'rgba(255,80,80,0.08)';

    layout.pairs.forEach((p, i) => {
      const delay = i * 400;
      sceneAnim.items.push({ type: 'ingredient', id: p.ids[0], delay, pos: layout.positions[p.ids[0]], done: false });
      sceneAnim.items.push({ type: 'ingredient', id: p.ids[1], delay: delay + 80, pos: layout.positions[p.ids[1]], done: false });
      sceneAnim.lines.push({
        from: layout.positions[p.ids[0]],
        to: layout.positions[p.ids[1]],
        delay: delay + 200,
        color: isConflict ? '#F44336' : isWarning ? '#FF9800' : '#4CAF50',
        dash: (isConflict || isWarning),
        label: p.label,
        detail: p.detail,
        done: false
      });
    });
    animateScene();
  }

  if (layout.type === 'hub') {
    sceneAnim.items.push({ type: 'ingredient', id: 'ha', delay: 0, pos: layout.positions.ha, big: true, done: false });
    layout.aroundIds.forEach((id, i) => {
      sceneAnim.items.push({ type: 'ingredient', id, delay: 150 + i * 80, pos: layout.positions[id], done: false });
      sceneAnim.lines.push({
        from: layout.positions.ha,
        to: layout.positions[id],
        delay: 200 + i * 80,
        color: '#4CAF50',
        dash: false,
        label: '✅',
        done: false
      });
    });
    sceneAnim.labels.push({ text: '跟谁都不打架 🌟', x: W / 2, y: layout.height - 30, delay: 1000, done: false });
    animateScene();
  }

  if (layout.type === 'summary') {
    sceneAnim.items.push({ type: 'summaryCards', delay: 0, done: false });
    animateScene();
  }
}

// ============ ANIMATION LOOP ============
function animateScene() {
  const now = performance.now();
  let allDone = true;

  ctx.clearRect(0, 0, W, H);

  if (sceneAnim.bgTint) {
    ctx.fillStyle = sceneAnim.bgTint;
    ctx.fillRect(0, 0, W, H);
  }
  drawBg(sceneAnim.bgTint ? '#FFF5EE' : '#FFF8F0');

  sceneAnim.items.forEach(item => {
    const elapsed = now - sceneAnim.startTime - item.delay;
    if (elapsed < 0) { allDone = false; return; }

    const t = Math.min(elapsed / 400, 1);
    const ease = elasticOut(t);

    if (item.type === 'ingredient') {
      drawIngredientBox(item.id, item.pos, ease, item.big);
    } else if (item.type === 'groupLabel') {
      ctx.save();
      ctx.globalAlpha = ease;
      ctx.fillStyle = item.color;
      ctx.font = 'bold 14px "Noto Sans SC", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(item.label, item.x, item.y);
      ctx.restore();
    } else if (item.type === 'summaryCards') {
      drawSummaryCards(Math.min(elapsed / 600, 1));
    }

    if (t < 1) allDone = false;
    else item.done = true;
  });

  sceneAnim.lines.forEach(line => {
    const elapsed = now - sceneAnim.startTime - line.delay;
    if (elapsed < 0) { allDone = false; return; }

    const drawDuration = 400;
    const t = Math.min(elapsed / drawDuration, 1);

    drawAnimatedLine(line, t);

    if (t >= 1 && line.label) {
      const labelElapsed = elapsed - drawDuration;
      const labelAlpha = Math.min(labelElapsed / 300, 1);
      if (labelAlpha > 0) {
        const mx = (line.from.x + line.to.x) / 2;
        const my = (line.from.y + line.to.y) / 2;
        ctx.save();
        ctx.globalAlpha = labelAlpha;
        // Label on line center
        ctx.fillStyle = line.color;
        ctx.font = 'bold 12px "Noto Sans SC", sans-serif';
        ctx.textAlign = 'center';
        ctx.shadowColor = '#fff';
        ctx.shadowBlur = 4;
        ctx.fillText(line.label, mx, my - 4);
        if (line.detail) {
          ctx.font = '10px "Noto Sans SC", sans-serif';
          ctx.fillStyle = '#888';
          ctx.fillText(line.detail, mx, my + 12);
        }
        ctx.restore();
      }
      if (labelAlpha < 1) allDone = false;
    }

    if (t < 1) allDone = false;
    else line.done = true;
  });

  sceneAnim.labels.forEach(lb => {
    const elapsed = now - sceneAnim.startTime - lb.delay;
    if (elapsed < 0) { allDone = false; return; }
    const alpha = Math.min(elapsed / 400, 1);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#4CAF50';
    ctx.font = 'bold 16px "ZCOOL XiaoWei", serif';
    ctx.textAlign = 'center';
    ctx.fillText(lb.text, lb.x, lb.y);
    ctx.restore();
    if (alpha < 1) allDone = false;
  });

  if (!allDone) {
    animFrame = requestAnimationFrame(animateScene);
  }
}

// ============ DRAWING HELPERS ============
function drawBg(color) {
  ctx.fillStyle = color;
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(200,180,160,0.06)';
  for (let x = 0; x < W; x += 20) {
    for (let y = 0; y < H; y += 20) {
      ctx.beginPath();
      ctx.arc(x, y, 0.8, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawIngredientBox(id, pos, scale, big) {
  const ing = ingredients.find(i => i.id === id);
  if (!ing) return;

  const s = big ? 1.25 : 1;
  const bw = BOX_W * s, bh = BOX_H * s;

  ctx.save();
  ctx.translate(pos.x, pos.y);
  ctx.scale(scale, scale);

  if (big) {
    ctx.shadowColor = ing.color;
    ctx.shadowBlur = 15;
  }

  rc.rectangle(-bw / 2, -bh / 2, bw, bh, {
    stroke: ing.color,
    strokeWidth: big ? 2.5 : 2,
    fill: ing.color + '25',
    fillStyle: 'solid',
    roughness: 1.5,
    bowing: 2
  });

  ctx.shadowBlur = 0;

  ctx.fillStyle = '#3D3D3D';
  ctx.font = `bold ${big ? 15 : 14}px "Noto Sans SC", sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText(ing.name, 0, -6);

  ctx.fillStyle = '#999';
  ctx.font = `${big ? 10 : 9}px "Noto Sans SC", sans-serif`;
  ctx.fillText(ing.en, 0, 9);

  const tagW = ctx.measureText(ing.cat).width + 10;
  ctx.fillStyle = ing.color + '50';
  roundRectFill(ctx, -tagW / 2, 13, tagW, 15, 7);
  ctx.fillStyle = '#666';
  ctx.font = `${big ? 10 : 9}px "Noto Sans SC", sans-serif`;
  ctx.fillText(ing.cat, 0, 24);

  ctx.restore();
}

function drawAnimatedLine(line, t) {
  const fx = line.from.x, fy = line.from.y;
  const tx = line.to.x, ty = line.to.y;
  const cx = fx + (tx - fx) * t;
  const cy = fy + (ty - fy) * t;

  ctx.save();
  ctx.strokeStyle = line.color;
  ctx.lineWidth = 2;
  ctx.globalAlpha = 0.7;

  if (line.dash) {
    ctx.setLineDash([6, 4]);
  }

  rc.line(fx, fy, cx, cy, {
    stroke: line.color,
    strokeWidth: 2,
    roughness: 1.2
  });

  ctx.restore();
}

function drawSummaryCards(progress) {
  const recipes = [
    { name: '🌅 早C晚A', desc: '早: VC衍生物 + 防晒\n晚: A醇 + 神经酰胺面霜', color: '#FFB6C1' },
    { name: '✨ 美白攻坚', desc: '传明酸 + 烟酰胺\n→ 防晒（必须！）', color: '#DDA0DD' },
    { name: '🌿 温和抗老', desc: '胜肽 + 玻色因\n+ 神经酰胺修复', color: '#98D8C8' },
    { name: '💧 刷酸修复', desc: '果酸 或 水杨酸（选一）\n→ 神经酰胺修复', color: '#FFD700' }
  ];

  const cardW = W - 32;
  const cardH = 100;
  const gapY = 14;
  const startX = 16;

  ctx.save();
  ctx.globalAlpha = progress;
  ctx.fillStyle = '#6B4E71';
  ctx.font = 'bold 18px "ZCOOL XiaoWei", serif';
  ctx.textAlign = 'center';
  ctx.fillText('💡 实用搭配方案', W / 2, 35);

  ctx.font = '12px "Noto Sans SC", sans-serif';
  ctx.fillStyle = '#999';
  ctx.fillText('根据你的需求选一套，别贪心全上！', W / 2, 58);

  recipes.forEach((r, i) => {
    const x = startX;
    const y = 75 + i * (cardH + gapY);

    const cardProgress = Math.min(Math.max((progress - i * 0.12) / 0.4, 0), 1);
    if (cardProgress <= 0) return;

    ctx.save();
    ctx.globalAlpha = cardProgress;
    const ease = elasticOut(Math.min(cardProgress * 1.2, 1));
    ctx.translate(x + cardW / 2, y + cardH / 2);
    ctx.scale(ease, ease);
    ctx.translate(-(x + cardW / 2), -(y + cardH / 2));

    rc.rectangle(x, y, cardW, cardH, {
      stroke: r.color,
      strokeWidth: 1.5,
      fill: r.color + '15',
      fillStyle: 'solid',
      roughness: 1.5
    });

    ctx.fillStyle = '#3D3D3D';
    ctx.font = 'bold 15px "Noto Sans SC", sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(r.name, x + 15, y + 30);

    ctx.fillStyle = '#777';
    ctx.font = '12px "Noto Sans SC", sans-serif';
    const lines = r.desc.split('\n');
    lines.forEach((line, li) => {
      ctx.fillText(line, x + 15, y + 52 + li * 20);
    });

    ctx.restore();
  });

  if (progress > 0.8) {
    const footerAlpha = Math.min((progress - 0.8) / 0.2, 1);
    ctx.save();
    ctx.globalAlpha = footerAlpha;
    ctx.fillStyle = '#B8A9C9';
    ctx.font = '13px "Noto Sans SC", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('截图收藏这张图 💾', W / 2, H - 55);
    ctx.fillStyle = '#C0B0A0';
    ctx.font = '11px "Noto Sans SC", sans-serif';
    ctx.fillText('关注我 · 程序员用UML讲美妆 · 下一期更精彩', W / 2, H - 30);
    ctx.restore();
  }

  ctx.restore();
}

function elasticOut(t) {
  if (t === 0 || t === 1) return t;
  return Math.pow(2, -10 * t) * Math.sin((t - 0.075) * (2 * Math.PI) / 0.3) + 1;
}

function roundRectFill(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  ctx.fill();
}

function renderCurrentScene() {
  if (currentScene < 0) { drawCover(); return; }
  setupScene(currentScene);
}

// ============ UI UPDATES ============
function updateSceneDots() {
  document.querySelectorAll('.scene-dot').forEach((dot, i) => {
    dot.classList.toggle('active', i === currentScene);
  });
}

function updateProgress() {
  const pct = ((currentScene + 1) / TOTAL_SCENES) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
}

// ============ CONTROLS ============
function setMode(mode) {
  autoMode = mode === 'auto';
  document.getElementById('btnAuto').classList.toggle('active', autoMode);
  document.getElementById('btnManual').classList.toggle('active', !autoMode);
  if (autoMode && started && !transitioning) {
    clearTimeout(animTimer);
    animTimer = setTimeout(() => {
      if (currentScene < TOTAL_SCENES - 1) goToScene(currentScene + 1);
    }, 3000);
  } else {
    clearTimeout(animTimer);
  }
}

function toggleTTS() {
  ttsEnabled = !ttsEnabled;
  document.getElementById('btnTTS').textContent = ttsEnabled ? '🔊' : '🔇';
  document.getElementById('btnTTS').classList.toggle('active', ttsEnabled);
  if (!ttsEnabled) speechSynthesis.cancel();
}

function restart() {
  speechSynthesis.cancel();
  clearTimeout(animTimer);
  if (animFrame) cancelAnimationFrame(animFrame);
  currentScene = -1;
  started = false;
  transitioning = false;
  canvas.style.opacity = '1';
  document.getElementById('narration').style.display = 'none';
  document.getElementById('progressFill').style.width = '0%';
  updateSceneDots();
  setCanvasSize(420);
  drawCover();

  setTimeout(() => {
    canvas.addEventListener('click', function coverClick(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = W / rect.width;
      const scaleY = H / rect.height;
      const mx = (e.clientX - rect.left) * scaleX;
      const my = (e.clientY - rect.top) * scaleY;
      if (mx > W / 2 - 80 && mx < W / 2 + 80 && my > 230 && my < 280) {
        canvas.removeEventListener('click', coverClick);
        startPresentation();
      }
    });
  }, 100);
}

// ============ TTS ============
function speak(text) {
  if (!ttsEnabled || !window.speechSynthesis) return;
  speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'zh-CN';
  utter.rate = 0.95;
  utter.pitch = 1.1;
  utter.volume = 1;
  if (zhVoice) utter.voice = zhVoice;
  utter.onend = () => {
    if (autoMode && started && !transitioning) {
      clearTimeout(animTimer);
      animTimer = setTimeout(() => {
        if (currentScene < TOTAL_SCENES - 1) goToScene(currentScene + 1);
      }, 1500);
    }
  };
  utter.onerror = () => {
    if (autoMode && started && !transitioning) {
      clearTimeout(animTimer);
      animTimer = setTimeout(() => {
        if (currentScene < TOTAL_SCENES - 1) goToScene(currentScene + 1);
      }, 2000);
    }
  };
  speechSynthesis.speak(utter);
}

// ============ START ============
window.addEventListener('DOMContentLoaded', init);
</script>
