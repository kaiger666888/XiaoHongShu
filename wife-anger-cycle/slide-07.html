<!DOCTYPE html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;background:#FFF9F0;font-family:'PingFang SC','Microsoft YaHei',sans-serif;color:#2C3E50}
.wrap{padding:30px 32px 30px 32px}
h2{font-size:86px;font-weight:900}
.sub{font-size:43px;color:#7F8C8D;margin-bottom:16px}
.txt{font-size:24px;line-height:1.5}
.sm{font-size:36px;color:#7F8C8D}
.card{background:#fff;border-radius:12px;padding:25px 28px;margin:12px 0;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.highlight{color:#F44336;font-weight:bold}
.green{color:#4CAF50;font-weight:bold}
svg text{font-family:'PingFang SC','Microsoft YaHei',sans-serif}
.foot{position:fixed;bottom:32px;left:64px;font-size:32px;color:#7F8C8D}
</style></head><body>
<div class="wrap">
  <h2>第四章：最危险的死循环</h2>
  <div class="sub">你以为结束了，其实只是开始了……</div>

  <div class="card">
    <div class="txt" style="margin-bottom:12px"><span style="color:#9C27B0;font-weight:bold">☁️ 阴天态特征</span></div>
    <div class="txt" style="line-height:1.6">
      表面说"算了没事了" — <span class="highlight">但并没有</span><br>
      对你的态度"还行" — 但明显少了点什么<br>
      偶尔翻个白眼 — 你假装没看见
    </div>
  </div>

  <div style="display:flex;gap:12px">
    <div class="card" style="flex:1;border-left:4px solid #F44336">
      <div class="txt" style="margin-bottom:8px"><span class="highlight">❺ 道歉失败</span></div>
      <div class="txt" style="line-height:1.6;font-size:39px">
        ❌ "我来跟你讲道理"<br>
        ❌ "分析一下对错"<br>
        ❌ "我都道歉了你还要怎样"
      </div>
    </div>
    <div class="card" style="flex:1;border-left:4px solid #FF5722">
      <div class="txt" style="margin-bottom:8px;color:#FF5722;font-weight:bold">❻ 二次爆发</span></div>
      <div class="txt" style="line-height:1.6;font-size:39px">
        比第一次更猛烈<br>
        加上"你上次也是这样"<br>
        进入死循环 ♾️
      </div>
    </div>
  </div>

  <svg width="952" height="160" viewBox="0 0 952 160">
    <defs>
      <marker id="ah7r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#F44336"/>
      </marker>
      <marker id="ah7l" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#9C27B0"/>
      </marker>
    </defs>
    <rect x="40" y="40" width="180" height="80" rx="16" fill="#F3E5F5" stroke="#9C27B0" stroke-width="3"/>
    <text x="130" y="88" text-anchor="middle" font-size="43" font-weight="bold" fill="#6A1B9A">阴天态</text>
    <rect x="732" y="40" width="180" height="80" rx="16" fill="#FFEBEE" stroke="#F44336" stroke-width="3"/>
    <text x="822" y="88" text-anchor="middle" font-size="43" font-weight="bold" fill="#C62828">爆发态</text>
    <!-- ❺ 阴天→爆发 上方箭头 -->
    <line x1="220" y1="55" x2="732" y2="55" stroke="#F44336" stroke-width="2.5" marker-end="url(#ah7r)"/>
    <rect x="386" y="32" width="215" height="28" rx="6" fill="rgba(255,255,255,0.85)"/>
    <text x="476" y="53" text-anchor="middle" font-size="32" fill="#F44336">❺ 道歉失败</text>
    <!-- ❻ 爆发→阴天 下方箭头 -->
    <line x1="732" y1="105" x2="220" y2="105" stroke="#9C27B0" stroke-width="2.5" marker-end="url(#ah7l)"/>
    <rect x="386" y="92" width="215" height="28" rx="6" fill="rgba(255,255,255,0.85)"/>
    <text x="476" y="113" text-anchor="middle" font-size="32" fill="#9C27B0">❻ 二次爆发</text>
    <!-- 循环标记 -->
    <text x="476" y="145" text-anchor="middle" font-size="36" fill="#F44336" font-weight="bold">↻ 死循环</text>
  </svg>

  <div style="margin-top:10px;padding:18px 25px;background:linear-gradient(90deg,#F3E5F5,#FFEBEE);border-radius:12px;border-left:4px solid #9C27B0">
    <div class="txt" style="font-style:italic">"阴天态是最危险的，因为你觉得'已经过去了'。"</div>
  </div>
</div>
<div class="foot">7 / 9</div>
</body></html>
