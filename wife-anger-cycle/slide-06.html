<!DOCTYPE html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;background:#FFF9F0;font-family:'PingFang SC','Microsoft YaHei',sans-serif;color:#2C3E50}
.wrap{padding:60px 48px 48px 48px}
h2{font-size:86px;font-weight:900}
.sub{font-size:43px;color:#7F8C8D;margin-bottom:43px}
.txt{font-size:43px;line-height:1.75}
.sm{font-size:36px;color:#7F8C8D}
.card{background:#fff;border-radius:28px;padding:50px 57px;margin:36px 0;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.highlight{color:#F44336;font-weight:bold}
.green{color:#4CAF50;font-weight:bold}
svg text{font-family:'PingFang SC','Microsoft YaHei',sans-serif}
.foot{position:static;text-align:right;padding-top:60px;font-size:32px;color:#7F8C8D}
</style></head><body>
<div class="wrap">
  <h2>第三章：全面崩溃</h2>
  <div class="sub">爆发不是终点，冷冻才是……</div>

  <div style="display:flex;gap:36px">
    <div class="card" style="flex:1;border-top:4px solid #F44336">
      <div class="txt" style="margin-bottom:21px"><span class="highlight">💥 爆发态</span></div>
      <div class="txt" style="line-height:1.655">
        语速加快<br>
        翻旧账（从去年开始）<br>
        摔门<br>
        "你永远都是这样！"
      </div>
    </div>
    <div class="card" style="flex:1;border-top:4px solid #1565C0">
      <div class="txt" style="margin-bottom:21px;color:#1565C0;font-weight:bold">🧊 冷冻态</span></div>
      <div class="txt" style="line-height:1.655">
        不说话<br>
        分房睡<br>
        朋友圈伤感文案<br>
        "你开心就好"
      </div>
    </div>
  </div>

  <div class="card" style="text-align:center">
    <div class="txt">恢复难度 <span style="font-size:50px">⭐⭐⭐⭐⭐</span></div>
  </div>

  <svg width="952" height="120" viewBox="0 0 952 120">
    <defs>
      <marker id="ah6" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#F44336"/>
      </marker>
    </defs>
    <rect x="40" y="20" width="180" height="80" rx="16" fill="#FFEBEE" stroke="#F44336" stroke-width="3"/>
    <text x="130" y="68" text-anchor="middle" font-size="43" font-weight="bold" fill="#C62828">爆发态</text>
    <rect x="732" y="20" width="180" height="80" rx="16" fill="#E3F2FD" stroke="#1565C0" stroke-width="3"/>
    <text x="822" y="68" text-anchor="middle" font-size="43" font-weight="bold" fill="#1565C0">冷冻态</text>
    <line x1="220" y1="60" x2="732" y2="60" stroke="#F44336" stroke-width="2.5" marker-end="url(#ah6)"/>
    <rect x="386" y="36" width="180" height="28" rx="6" fill="rgba(255,255,255,0.85)"/>
    <text x="476" y="57" text-anchor="middle" font-size="32" fill="#F44336">❹ 无人劝阻</text>
  </svg>

  <div style="margin-top:36px;padding:36px 50px;background:linear-gradient(90deg,#FFEBEE,#E3F2FD);border-radius:21px;border-left:4px solid #1565C0">
    <div class="txt" style="font-style:italic">"冷冻态不是冷静，是心寒。热量没了，就再也点不起来了。"</div>
  </div>
</div>
<div class="foot">6 / 9</div>
</body></html>
