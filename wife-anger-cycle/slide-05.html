<!DOCTYPE html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;background:#FFF9F0;font-family:'PingFang SC','Microsoft YaHei',sans-serif;color:#2C3E50}
.wrap{padding:60px 48px 48px 48px}
h2{font-size:86px;font-weight:900}
.sub{font-size:43px;color:#7F8C8D;margin-bottom:43px}
.txt{font-size:43px;line-height:1.75}
.sm{font-size:36px;color:#7F8C8D}
.card{background:#fff;border-radius:28px;padding:50px 57px;margin:36px 0;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.highlight{color:#F44336;font-weight:bold}
.green{color:#4CAF50;font-weight:bold}
svg text{font-family:'PingFang SC','Microsoft YaHei',sans-serif}
.foot{position:static;padding-top:60px;font-size:32px;color:#7F8C8D}
</style></head><body>
<div class="wrap">
  <h2>第二章：你居然没发现？</h2>
  <div class="sub">她给了你2小时窗口，你用来打游戏了……</div>

  <div class="card">
    <div class="txt" style="margin-bottom:28px"><span class="highlight">👻 酝酿期的"隐形信号"</span></div>
    <div class="txt" style="line-height:1.655.0">
      📦 收拾东西声特别大<br>
      🚪 关门声比平时重<br>
      💬 回消息从秒回到轮回<br>
      📱 刷手机但不是在笑
    </div>
  </div>

  <div class="card" style="border-left:4px solid #F44336">
    <div class="txt"><span class="highlight">🚨 窗口关闭标志</span></div>
    <div class="txt" style="margin-top:14px;font-size:50px;font-weight:bold">"算了，跟你说也没用"</div>
    <div class="sm" style="margin-top:14px">听到这句话，你还有大约30秒……</div>
  </div>

  <svg width="952" height="120" viewBox="0 0 952 120">
    <defs>
      <marker id="ah5" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#F44336"/>
      </marker>
    </defs>
    <rect x="40" y="20" width="180" height="80" rx="16" fill="#FFF3E0" stroke="#FF9800" stroke-width="3"/>
    <text x="130" y="68" text-anchor="middle" font-size="43" font-weight="bold" fill="#E65100">酝酿态</text>
    <rect x="732" y="20" width="180" height="80" rx="16" fill="#FFEBEE" stroke="#F44336" stroke-width="3"/>
    <text x="822" y="68" text-anchor="middle" font-size="43" font-weight="bold" fill="#C62828">爆发态</text>
    <line x1="220" y1="60" x2="732" y2="60" stroke="#F44336" stroke-width="2.5" marker-end="url(#ah5)"/>
    <rect x="386" y="36" width="180" height="28" rx="6" fill="rgba(255,255,255,0.85)"/>
    <text x="476" y="57" text-anchor="middle" font-size="32" fill="#F44336">❸ 继续忽视</text>
  </svg>

  <div style="margin-top:36px;padding:36px 50px;background:linear-gradient(90deg,#FFF3E0,#FFEBEE);border-radius:21px;border-left:4px solid #FF9800">
    <div class="txt" style="font-style:italic">"她在等你主动，你却觉得一切正常。"</div>
  </div>
</div>
<div class="foot">5 / 9</div>
</body></html>
