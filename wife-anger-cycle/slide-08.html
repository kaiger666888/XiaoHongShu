<!DOCTYPE html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;background:#FFF9F0;font-family:'PingFang SC','Microsoft YaHei',sans-serif;color:#2C3E50}
.wrap{padding:60px 48px 48px 48px}
h2{font-size:86px;font-weight:900}
.sub{font-size:43px;color:#7F8C8D;margin-bottom:43px}
.txt{font-size:43px;line-height:1.75}
.sm{font-size:36px;color:#7F8C8D}
.card{background:#fff;border-radius:28px;padding:50px 57px;margin:36px 0;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.highlight{color:#F44336;font-weight:bold}
.green{color:#4CAF50;font-weight:bold}
svg text{font-family:'PingFang SC','Microsoft YaHei',sans-serif}
.foot{position:static;padding-top:60px;font-size:32px;color:#7F8C8D}
</style></head><body>
<div class="wrap">
  <h2>终章：唯一的修复方案</h2>
  <div class="sub">三条路，只有一条是对的</div>

  <div style="display:flex;gap:28px;margin-bottom:36px">
    <div class="card" style="flex:1;border-top:3px solid #1565C0">
      <div class="txt" style="color:#1565C0;font-weight:bold;margin-bottom:14px">❶ 冷冻态恢复</div>
      <div class="sm" style="line-height:1.65">
        靠时间慢慢融化<br>
        <span class="highlight">但有后遗症</span><br>
        信任裂痕永久留存
      </div>
    </div>
    <div class="card" style="flex:1;border-top:3px solid #9C27B0">
      <div class="txt" style="color:#9C27B0;font-weight:bold;margin-bottom:14px">❷ 阴天态假恢复</div>
      <div class="sm" style="line-height:1.65">
        反复循环<br>
        <span class="highlight">越闹越凶</span><br>
        能量持续消耗
      </div>
    </div>
    <div class="card" style="flex:1;border-top:3px solid #4CAF50;background:#F1F8E9">
      <div class="txt green" style="margin-bottom:14px">✅ ❽ 正确出口</div>
      <div class="sm" style="line-height:1.65">
        认真听她说话<br>
        <span class="green">情绪被看见</span><br>
        一次性修复
      </div>
    </div>
  </div>

  <div style="text-align:center;padding:57px;background:linear-gradient(135deg,#E8F5E9,#C8E6C9);border-radius:28px;margin-bottom:36px">
    <div style="font-size:75px;font-weight:900;color:#2E7D32;letter-spacing:4px">"认真听她说话"</div>
  </div>

  <svg width="952" height="180" viewBox="0 0 952 180">
    <defs>
      <marker id="ah8g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#4CAF50"/>
      </marker>
      <marker id="ah8b" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#9E9E9E"/>
      </marker>
      <marker id="ah8r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#E53935"/>
      </marker>
    </defs>
    <!-- 三个源状态 -->
    <rect x="40" y="10" width="160" height="50" rx="12" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
    <text x="120" y="42" text-anchor="middle" font-size="36" font-weight="bold" fill="#1565C0">冷冻态</text>
    <rect x="40" y="65" width="160" height="50" rx="12" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/>
    <text x="120" y="97" text-anchor="middle" font-size="36" font-weight="bold" fill="#9C27B0">阴天态</text>
    <!-- 目标状态 -->
    <rect x="752" y="32" width="160" height="60" rx="16" fill="#E8F5E9" stroke="#4CAF50" stroke-width="3"/>
    <text x="832" y="70" text-anchor="middle" font-size="43" font-weight="bold" fill="#2E7D32">平静态</text>
    <!-- ❼ 冷冻→平静 -->
    <line x1="200" y1="35" x2="752" y2="52" stroke="#9E9E9E" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#ah8b)"/>
    <rect x="410" y="26" width="140" height="24" rx="5" fill="rgba(255,255,255,0.85)"/>
    <text x="480" y="44" text-anchor="middle" font-size="28" fill="#9E9E9E">❼ 自行恢复</text>
    <!-- 阴天→平静（假恢复虚线） -->
    <line x1="200" y1="90" x2="752" y2="72" stroke="#9E9E9E" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#ah8b)"/>
    <rect x="405" y="68" width="150" height="24" rx="5" fill="rgba(255,255,255,0.85)"/>
    <text x="480" y="86" text-anchor="middle" font-size="28" fill="#9E9E9E">反复循环 ↻</text>
    <!-- ❽ 绿色高亮路径 -->
    <line x1="200" y1="90" x2="752" y2="62" stroke="#4CAF50" stroke-width="3.5" marker-end="url(#ah8g)"/>
    <rect x="405" y="120" width="150" height="28" rx="6" fill="rgba(255,255,255,0.9)" stroke="#4CAF50" stroke-width="1.5"/>
    <text x="480" y="140" text-anchor="middle" font-size="32" fill="#2E7D32" font-weight="bold">✅ ❽ 认真哄好了</text>
    <line x1="480" y1="120" x2="480" y2="90" stroke="#4CAF50" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  </svg>

  <div style="padding:36px 50px;background:#F5F5F5;border-radius:21px;border-left:4px solid #003057">
    <div class="sm" style="color:#666;margin-bottom:6px">🚗 沃尔沃类比</div>
    <div class="txt" style="font-size:39px;color:#444">"能预警碰撞，预警不了'我没事'。<br>安全不只是技术，也是一种态度。"</div>
  </div>
</div>
<div class="foot">8 / 9</div>
</body></html>
