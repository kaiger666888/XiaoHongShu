<!DOCTYPE html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;flex-direction:column;align-items:center;min-height:1440px;height:1440px;justify-content:space-between;width:1080px;background:#FFF9F0;font-family:'PingFang SC','Microsoft YaHei',sans-serif;color:#2C3E50;overflow:hidden;position:relative};min-height:1440px;height:1440px;justify-content:space-between;
/* Purple danger glow top-left */
body::before{content:'';position:absolute;top:-150px;left:-150px;width:700px;height:700px;background:radial-gradient(ellipse,rgba(156,39,176,.18) 0%,transparent 70%);pointer-events:none}
/* Red glow bottom-right */
body::after{content:'';position:absolute;bottom:-200px;right:-200px;width:600px;height:600px;background:radial-gradient(ellipse,rgba(244,67,54,.15) 0%,transparent 70%);pointer-events:none}
.wrap{padding:32px 40px 20px 40px;position:relative;z-index:1}
h2{font-size:66px;font-weight:900;text-shadow:4px 4px 0 rgba(0,0,0,.1),8px 8px 0 rgba(0,0,0,.05)}
.sub{font-size:34px;color:#7F8C8D;margin-bottom:16px}
.txt{font-size:38px;line-height:1.5}
.sm{font-size:36px;color:#7F8C8D}
.card{background:#fff;border-radius:28px;padding:28px 40px;margin:10px 0;position:relative;
  box-shadow:0 10px 30px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.08),inset 0 1px 0 rgba(255,255,255,.8);
  border:1px solid rgba(0,0,0,.04);transform:perspective(600px) rotateY(-2deg);transition:transform .3s ease}
.card::before{content:'';position:absolute;top:0;left:24px;right:24px;height:2px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.9),transparent)}
.highlight{color:#F44336;font-weight:bold}
.green{color:#4CAF50;font-weight:bold}
svg text{font-family:'PingFang SC','Microsoft YaHei',sans-serif}
.foot{position:fixed;bottom:28px;left:0;right:0;text-align:center;font-size:24px;color:#7F8C8D;z-index:10}

/* SVG diagram with depth */
.svg-stage{perspective:800px;margin-top:28px}
.svg-plane{transform:rotateX(8deg);box-shadow:0 15px 40px rgba(0,0,0,.15),0 5px 15px rgba(0,0,0,.1);border-radius:16px;overflow:hidden}

/* Quote block */
.quote{margin-top:28px;padding:20px 32px;border-radius:14px;border-left:4px solid #9C27B0;position:relative;
  background:linear-gradient(135deg,#F3E5F5 0%,#FFEBEE 100%);
  box-shadow:0 10px 25px rgba(156,39,176,.12),0 2px 8px rgba(0,0,0,.08),inset 0 1px 0 rgba(255,255,255,.7);
  transform:perspective(600px) rotateY(-1.5deg)}
.quote::before{content:'';position:absolute;top:0;left:24px;right:24px;height:2px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.8),transparent)}

.flex-row{display:flex;gap:16px}
</style></head><body>
<div class="wrap">
  <h2>第四章：最危险的死循环</h2>
  <div class="sub">你以为结束了，其实只是开始了……</div>

  <div class="card" style="border-left:4px solid #9C27B0;box-shadow:0 10px 30px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.08),inset 0 1px 0 rgba(255,255,255,.8),-4px 0 15px rgba(156,39,176,.25),-8px 0 30px rgba(156,39,176,.12)">
    <div class="txt" style="margin-bottom:6px"><span style="color:#9C27B0;font-weight:bold">☁️ 阴天态特征</span></div>
    <div class="txt" style="line-height:1.55">
      表面说"算了没事了" — <span class="highlight">但并没有</span><br>
      对你的态度"还行" — 但明显少了点什么<br>
      偶尔翻个白眼 — 你假装没看见
    </div>
  </div>

  <div class="flex-row">
    <div class="card" style="flex:1;border-left:4px solid #F44336;box-shadow:0 10px 30px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.08),inset 0 1px 0 rgba(255,255,255,.8),-4px 0 15px rgba(244,67,54,.3),-8px 0 30px rgba(244,67,54,.15)">
      <div class="txt" style="margin-bottom:6px"><span class="highlight">❺ 道歉失败</span></div>
      <div class="txt" style="line-height:1.55;font-size:39px">
        ❌ "我来跟你讲道理"<br>
        ❌ "分析一下对错"<br>
        ❌ "我都道歉了你还要怎样"
      </div>
    </div>
    <div class="card" style="flex:1;border-left:4px solid #FF5722;box-shadow:0 10px 30px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.08),inset 0 1px 0 rgba(255,255,255,.8),-4px 0 15px rgba(255,87,34,.3),-8px 0 30px rgba(255,87,34,.15)">
      <div class="txt" style="margin-bottom:6px;color:#FF5722;font-weight:bold">❻ 二次爆发</div>
      <div class="txt" style="line-height:1.55;font-size:39px">
        比第一次更猛烈<br>
        加上"你上次也是这样"<br>
        进入死循环 ♾️
      </div>
    </div>
  </div>

  <div class="svg-stage">
    <div class="svg-plane">
      <svg width="952" height="160" viewBox="0 0 952 160">
        <defs>
          <marker id="ah7r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#F44336"/>
          </marker>
          <marker id="ah7l" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#9C27B0"/>
          </marker>
          <filter id="nodeShadow" x="-10%" y="-10%" width="120%" height="140%">
            <feDropShadow dx="3" dy="3" stdDeviation="3" flood-color="rgba(0,0,0,0.2)"/>
          </filter>
          <filter id="criticalGlow" x="-20%" y="-20%" width="140%" height="160%">
            <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="rgba(0,0,0,0.15)"/>
            <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="rgba(244,67,54,0.4)"/>
          </filter>
          <filter id="purpleGlow" x="-20%" y="-20%" width="140%" height="160%">
            <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="rgba(0,0,0,0.15)"/>
            <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="rgba(156,39,176,0.35)"/>
          </filter>
        </defs>
        <g filter="url(#purpleGlow)">
          <rect x="40" y="40" width="180" height="80" rx="16" fill="#F3E5F5" stroke="#9C27B0" stroke-width="3"/>
        </g>
        <text x="130" y="88" text-anchor="middle" font-size="43" font-weight="bold" fill="#6A1B9A">阴天态</text>
        <g filter="url(#criticalGlow)">
          <rect x="732" y="40" width="180" height="80" rx="16" fill="#FFEBEE" stroke="#F44336" stroke-width="3"/>
        </g>
        <text x="822" y="88" text-anchor="middle" font-size="43" font-weight="bold" fill="#C62828">爆发态</text>
        <!-- ❺ 阴天→爆发 -->
        <line x1="220" y1="55" x2="732" y2="55" stroke="#F44336" stroke-width="2.5" marker-end="url(#ah7r)"/>
        <rect x="386" y="32" width="180" height="28" rx="6" fill="rgba(255,255,255,0.85)"/>
        <text x="476" y="53" text-anchor="middle" font-size="32" fill="#F44336">❺ 道歉失败</text>
        <!-- ❻ 爆发→阴天 -->
        <line x1="732" y1="105" x2="220" y2="105" stroke="#9C27B0" stroke-width="2.5" marker-end="url(#ah7l)"/>
        <rect x="386" y="92" width="180" height="28" rx="6" fill="rgba(255,255,255,0.85)"/>
        <text x="476" y="113" text-anchor="middle" font-size="32" fill="#9C27B0">❻ 二次爆发</text>
        <text x="476" y="145" text-anchor="middle" font-size="36" fill="#F44336" font-weight="bold">↻ 死循环</text>
      </svg>
    </div>
  </div>

  <div class="quote">
    <div class="txt" style="font-style:italic">"阴天态是最危险的，因为你觉得'已经过去了'。"</div>
  </div>
</div>
<div class="foot">7 / 9</div>
<p style="position:fixed;bottom:28px;left:40px;font-size:24px;color:#7F8C8D;opacity:.4;z-index:10">© 架构活了@小红书</p>
</body></html>
