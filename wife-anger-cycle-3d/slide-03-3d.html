<!DOCTYPE html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;background:#FFF9F0;font-family:'PingFang SC','Microsoft YaHei',sans-serif;color:#2C3E50;overflow:hidden;position:relative}
/* Strong ambient light */
body::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 50% 30%,rgba(255,255,255,.4) 0%,transparent 60%);pointer-events:none;z-index:0}
/* Perspective grid at bottom */
body::after{content:'';position:absolute;bottom:0;left:-10%;right:-10%;height:500px;background:
  linear-gradient(rgba(0,0,0,.04) 1px,transparent 1px),
  linear-gradient(90deg,rgba(0,0,0,.04) 1px,transparent 1px);
background-size:120px 60px;
transform:perspective(400px) rotateX(45deg);
transform-origin:bottom center;
pointer-events:none;opacity:.6}
.wrap{padding:60px 48px 48px 48px;position:relative;z-index:1}
h2{font-size:79px;font-weight:900;text-shadow:4px 4px 0 rgba(0,0,0,.1),8px 8px 0 rgba(0,0,0,.05)}
.sub{font-size:39px;color:#7F8C8D;margin-bottom:36px}
.card{background:#fff;border-radius:25px;padding:36px 50px;margin:25px 0;box-shadow:0 10px 30px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.08),inset 0 1px 0 rgba(255,255,255,.8);border:1px solid rgba(0,0,0,.03)}
.txt{font-size:36px;line-height:1.65}
.sm{font-size:30px;color:#7F8C8D}
svg text{font-family:'PingFang SC','Microsoft YaHei',sans-serif}
.foot{position:static;padding-top:60px;font-size:28px;color:#7F8C8D}

/* STRONG 3D perspective for diagram */
.diagram-stage{perspective:800px;text-align:center;margin:25px 0}
.diagram-plane{transform:rotateX(12deg);transform-style:preserve-3d;transition:transform .5s ease;
  box-shadow:0 30px 60px rgba(0,0,0,.2),0 10px 20px rgba(0,0,0,.15);border-radius:20px;overflow:hidden}
/* Spotlight glow behind the diagram */
.diagram-plane::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:80%;height:70%;background:radial-gradient(ellipse,rgba(255,193,7,.15) 0%,transparent 70%);filter:blur(40px);z-index:-1}
</style></head><body>
<div class="wrap" style="min-height:1440px">
  <h2>📊 状态机图全貌</h2>
  <p class="sub">老婆情绪系统的完整状态转移图 · 8条路径一览</p>
  <div style="height:2px;background:linear-gradient(90deg,transparent,#2C3E50,transparent);opacity:.15;margin:28px 0 32px"></div>
  <div class="diagram-stage">
    <div class="diagram-plane">
      <svg viewBox="0 0 952 720" width="952" height="720" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="ag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10z" fill="#4CAF50" opacity=".7"/></marker>
          <marker id="ay" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10z" fill="#E6A800" opacity=".7"/></marker>
          <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10z" fill="#F44336" opacity=".7"/></marker>
          <marker id="ab" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10z" fill="#2196F3" opacity=".7"/></marker>
          <marker id="ap" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10z" fill="#9C27B0" opacity=".7"/></marker>
          <!-- STRONG shadow filter for nodes -->
          <filter id="nodeShadow" x="-15%" y="-15%" width="130%" height="150%">
            <feDropShadow dx="3" dy="3" stdDeviation="3" flood-color="rgba(0,0,0,0.2)"/>
          </filter>
          <!-- STRONG critical glow for burst node -->
          <filter id="criticalGlow" x="-30%" y="-30%" width="160%" height="180%">
            <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="rgba(0,0,0,0.15)"/>
            <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="rgba(244,67,54,0.5)"/>
          </filter>
          <filter id="recoveryGlow" x="-20%" y="-20%" width="140%" height="160%">
            <feDropShadow dx="3" dy="3" stdDeviation="3" flood-color="rgba(0,0,0,0.15)"/>
            <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="rgba(76,175,80,0.3)"/>
          </filter>
        </defs>

        <!-- 平静态 (top) -->
        <g filter="url(#recoveryGlow)">
          <rect x="380" y="20" width="200" height="70" rx="14" fill="#4CAF50" fill-opacity=".12" stroke="#4CAF50" stroke-width="2.5" stroke-dasharray="6,3"/>
        </g>
        <text x="480" y="50" text-anchor="middle" font-size="37" font-weight="bold" fill="#4CAF50">😌 平静态</text>
        <text x="480" y="74" text-anchor="middle" font-size="23" fill="#7F8C8D">Normal</text>

        <!-- 酝酿态 -->
        <g filter="url(#nodeShadow)">
          <rect x="40" y="240" width="210" height="70" rx="14" fill="#FFC107" fill-opacity=".12" stroke="#FFC107" stroke-width="2.5" stroke-dasharray="6,3"/>
        </g>
        <text x="145" y="270" text-anchor="middle" font-size="37" font-weight="bold" fill="#E6A800">🤔 酝酿态</text>
        <text x="145" y="294" text-anchor="middle" font-size="23" fill="#7F8C8D">Warning</text>

        <!-- 爆发态 - STRONG red glow -->
        <g filter="url(#criticalGlow)">
          <rect x="370" y="230" width="230" height="90" rx="16" fill="#F44336" fill-opacity=".15" stroke="#F44336" stroke-width="3"/>
        </g>
        <text x="485" y="272" text-anchor="middle" font-size="39" font-weight="bold" fill="#F44336">💢 爆发态</text>
        <text x="485" y="298" text-anchor="middle" font-size="23" fill="#7F8C8D">Critical</text>

        <!-- 冷冻态 -->
        <g filter="url(#nodeShadow)">
          <rect x="710" y="240" width="200" height="70" rx="14" fill="#2196F3" fill-opacity=".12" stroke="#2196F3" stroke-width="2.5" stroke-dasharray="6,3"/>
        </g>
        <text x="810" y="270" text-anchor="middle" font-size="37" font-weight="bold" fill="#2196F3">🧊 冷冻态</text>
        <text x="810" y="294" text-anchor="middle" font-size="23" fill="#7F8C8D">Frozen</text>

        <!-- 阴天态 -->
        <g filter="url(#nodeShadow)">
          <rect x="40" y="480" width="210" height="70" rx="14" fill="#9C27B0" fill-opacity=".12" stroke="#9C27B0" stroke-width="2.5" stroke-dasharray="6,3"/>
        </g>
        <text x="145" y="510" text-anchor="middle" font-size="37" font-weight="bold" fill="#9C27B0">🌧️ 阴天态</text>
        <text x="145" y="534" text-anchor="middle" font-size="23" fill="#7F8C8D">Unstable</text>

        <!-- 平静态恢复 -->
        <g filter="url(#recoveryGlow)">
          <rect x="710" y="480" width="200" height="70" rx="14" fill="#4CAF50" fill-opacity=".12" stroke="#4CAF50" stroke-width="2.5" stroke-dasharray="6,3"/>
        </g>
        <text x="810" y="510" text-anchor="middle" font-size="37" font-weight="bold" fill="#4CAF50">😌 平静态</text>
        <text x="810" y="534" text-anchor="middle" font-size="23" fill="#7F8C8D">Normal（恢复）</text>

        <!-- Arrows -->
        <line x1="415" y1="90" x2="230" y2="240" stroke="#FFC107" stroke-width="2" marker-end="url(#ay)" opacity=".6"/>
        <rect x="265" y="142" width="90" height="22" rx="4" fill="white" fill-opacity=".92"/>
        <text x="310" y="158" text-anchor="middle" font-size="21" font-weight="bold" fill="#E6A800">❶ 忽视预警</text>

        <line x1="545" y1="90" x2="220" y2="245" stroke="#FFC107" stroke-width="2" marker-end="url(#ay)" opacity=".4" stroke-dasharray="5,3"/>
        <rect x="345" y="132" width="90" height="22" rx="4" fill="white" fill-opacity=".92"/>
        <text x="390" y="148" text-anchor="middle" font-size="21" font-weight="bold" fill="#E6A800">❷ "你随意吧"</text>

        <line x1="250" y1="275" x2="370" y2="275" stroke="#F44336" stroke-width="2" marker-end="url(#ar)" opacity=".6"/>
        <rect x="275" y="253" width="90" height="22" rx="4" fill="white" fill-opacity=".92"/>
        <text x="320" y="269" text-anchor="middle" font-size="21" font-weight="bold" fill="#F44336">❸ 继续忽视</text>

        <line x1="600" y1="275" x2="710" y2="275" stroke="#2196F3" stroke-width="2" marker-end="url(#ab)" opacity=".6"/>
        <rect x="610" y="253" width="90" height="22" rx="4" fill="white" fill-opacity=".92"/>
        <text x="655" y="269" text-anchor="middle" font-size="21" font-weight="bold" fill="#2196F3">❹ 无人劝阻</text>

        <line x1="415" y1="320" x2="210" y2="480" stroke="#9C27B0" stroke-width="2" marker-end="url(#ap)" opacity=".6"/>
        <rect x="270" y="368" width="90" height="22" rx="4" fill="white" fill-opacity=".92"/>
        <text x="315" y="384" text-anchor="middle" font-size="21" font-weight="bold" fill="#9C27B0">❺ 道歉失败</text>

        <line x1="115" y1="480" x2="430" y2="320" stroke="#F44336" stroke-width="2" marker-end="url(#ar)" opacity=".6"/>
        <rect x="180" y="380" width="90" height="22" rx="4" fill="white" fill-opacity=".92"/>
        <text x="225" y="396" text-anchor="middle" font-size="21" font-weight="bold" fill="#F44336">❻ 二次爆发</text>

        <line x1="810" y1="310" x2="810" y2="480" stroke="#4CAF50" stroke-width="2" marker-end="url(#ag)" opacity=".6"/>
        <rect x="818" y="378" width="90" height="22" rx="4" fill="white" fill-opacity=".92"/>
        <text x="863" y="394" text-anchor="middle" font-size="21" font-weight="bold" fill="#4CAF50">❼ 自行恢复</text>

        <line x1="250" y1="515" x2="710" y2="515" stroke="#4CAF50" stroke-width="3" marker-end="url(#ag)" opacity=".7" stroke-dasharray="8,4"/>
        <rect x="420" y="520" width="110" height="22" rx="4" fill="white" fill-opacity=".92"/>
        <text x="475" y="536" text-anchor="middle" font-size="21" font-weight="bold" fill="#4CAF50">❽ 认真哄好了 ✓</text>

        <!-- Legend with depth -->
        <g>
          <rect x="660" y="590" width="280" height="120" rx="10" fill="white" fill-opacity=".92" stroke="#e0e0e0" stroke-width="1" filter="url(#nodeShadow)"/>
          <text x="675" y="612" font-size="25" font-weight="bold" fill="#2C3E50">路径说明</text>
          <text x="675" y="634" font-size="21" fill="#666">❶❷ 进入酝酿：高危信号出现</text>
          <text x="675" y="654" font-size="21" fill="#666">❸❹❻ 升级：忽视→爆发→冷冻</text>
          <text x="675" y="674" font-size="21" fill="#666">❺ 降级失败：假恢复后复发</text>
          <text x="675" y="694" font-size="21" fill="#4CAF50" font-weight="bold">❽ 真正恢复：认真听她说话</text>
        </g>
      </svg>
    </div>
  </div>
  <div class="card">
    <p class="txt" style="text-align:center">5个状态 · 8条转移路径 · 唯一正确出口：❽</p>
  </div>
</div>
<div class="foot">Page 3 / 9 · 3D Enhanced</div>
</body></html>
