<!DOCTYPE html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;background:#FFF9F0;font-family:'PingFang SC','Microsoft YaHei',sans-serif;color:#2C3E50;overflow:hidden;position:relative}
/* Orange warning glow top-left */
body::before{content:'';position:absolute;top:-150px;left:-150px;width:700px;height:700px;background:radial-gradient(ellipse,rgba(255,152,0,.18) 0%,transparent 70%);pointer-events:none}
/* Warm light bottom-right */
body::after{content:'';position:absolute;bottom:-200px;right:-200px;width:600px;height:600px;background:radial-gradient(ellipse,rgba(255,200,100,.15) 0%,transparent 70%);pointer-events:none}
.wrap{padding:36px 40px 24px 40px;position:relative;z-index:1}
h2{font-size:70px;font-weight:900;text-shadow:4px 4px 0 rgba(0,0,0,.1),8px 8px 0 rgba(0,0,0,.05)}
.sub{font-size:34px;color:#7F8C8D;margin-bottom:16px}
.txt{font-size:38px;line-height:1.5}
.sm{font-size:36px;color:#7F8C8D}
.card{background:#fff;border-radius:28px;padding:28px 40px;margin:14px 0;position:relative;
  box-shadow:0 10px 30px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.08),inset 0 1px 0 rgba(255,255,255,.8);
  border:1px solid rgba(0,0,0,.04);transform:perspective(600px) rotateY(-2deg);transition:transform .3s ease}
.card::before{content:'';position:absolute;top:0;left:24px;right:24px;height:2px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.9),transparent)}
.highlight{color:#F44336;font-weight:bold}
.green{color:#4CAF50;font-weight:bold}
svg text{font-family:'PingFang SC','Microsoft YaHei',sans-serif}
.foot{position:static;padding-top:20px;font-size:24px;color:#7F8C8D}

/* Danger card */
.card-danger{border-left:4px solid #F44336;
  box-shadow:0 10px 30px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.08),inset 0 1px 0 rgba(255,255,255,.8),-4px 0 15px rgba(244,67,54,.3),-8px 0 30px rgba(244,67,54,.15)}

/* Info card */
.card-info{border-left:4px solid #FF9800;
  box-shadow:0 10px 30px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.08),inset 0 1px 0 rgba(255,255,255,.8),-4px 0 15px rgba(255,152,0,.25),-8px 0 30px rgba(255,152,0,.12)}

/* SVG diagram with depth */
.svg-stage{perspective:800px;margin-top:14px}
.svg-plane{transform:rotateX(8deg);box-shadow:0 15px 40px rgba(0,0,0,.15),0 5px 15px rgba(0,0,0,.1);border-radius:16px;overflow:hidden}

/* Quote block */
.quote{margin-top:14px;padding:22px 36px;border-radius:16px;border-left:4px solid #FF9800;position:relative;
  background:linear-gradient(135deg,#FFF3E0 0%,#FFEBEE 100%);
  box-shadow:0 10px 25px rgba(244,67,54,.12),0 2px 8px rgba(0,0,0,.08),inset 0 1px 0 rgba(255,255,255,.7);
  transform:perspective(600px) rotateY(-1.5deg)}
.quote::before{content:'';position:absolute;top:0;left:24px;right:24px;height:2px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.8),transparent)}
</style></head><body>
<div class="wrap">
  <h2>第二章：你居然没发现？</h2>
  <div class="sub">她给了你2小时窗口，你用来打游戏了……</div>

  <div class="card">
    <div class="txt" style="margin-bottom:6px"><span class="highlight">👻 酝酿期的"隐形信号"</span></div>
    <div class="txt" style="line-height:1.55">
      📦 收拾东西声特别大<br>
      🚪 关门声比平时重<br>
      💬 回消息从秒回到轮回<br>
      📱 刷手机但不是在笑
    </div>
  </div>

  <div class="card card-danger">
    <div class="txt"><span class="highlight">🚨 窗口关闭标志</span></div>
    <div class="txt" style="margin-top:8px;font-size:40px;font-weight:bold">"算了，跟你说也没用"</div>
    <div class="sm" style="margin-top:8px">听到这句话，你还有大约30秒……</div>
  </div>

  <div class="svg-stage">
    <div class="svg-plane">
      <svg width="952" height="120" viewBox="0 0 952 120">
        <defs>
          <marker id="ah5" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#F44336"/>
          </marker>
          <filter id="nodeShadow" x="-10%" y="-10%" width="120%" height="140%">
            <feDropShadow dx="3" dy="3" stdDeviation="3" flood-color="rgba(0,0,0,0.2)"/>
          </filter>
          <filter id="criticalGlow" x="-20%" y="-20%" width="140%" height="160%">
            <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="rgba(0,0,0,0.15)"/>
            <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="rgba(244,67,54,0.4)"/>
          </filter>
        </defs>
        <g filter="url(#nodeShadow)">
          <rect x="40" y="20" width="180" height="80" rx="16" fill="#FFF3E0" stroke="#FF9800" stroke-width="3"/>
        </g>
        <text x="130" y="68" text-anchor="middle" font-size="43" font-weight="bold" fill="#E65100">酝酿态</text>
        <g filter="url(#criticalGlow)">
          <rect x="732" y="20" width="180" height="80" rx="16" fill="#FFEBEE" stroke="#F44336" stroke-width="3"/>
        </g>
        <text x="822" y="68" text-anchor="middle" font-size="43" font-weight="bold" fill="#C62828">爆发态</text>
        <line x1="220" y1="60" x2="732" y2="60" stroke="#F44336" stroke-width="2.5" marker-end="url(#ah5)"/>
        <rect x="386" y="36" width="180" height="28" rx="6" fill="rgba(255,255,255,0.85)"/>
        <text x="476" y="57" text-anchor="middle" font-size="32" fill="#F44336">❸ 继续忽视</text>
      </svg>
    </div>
  </div>

  <div class="quote">
    <div class="txt" style="font-style:italic">"她在等你主动，你却觉得一切正常。"</div>
  </div>
</div>
<div class="foot">5 / 9</div>
</body></html>
