<!DOCTYPE html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;flex-direction:column;align-items:center;min-height:1440px;height:1440px;justify-content:space-between;width:1080px;background:#FFF9F0;font-family:'PingFang SC','Microsoft YaHei',sans-serif;color:#2C3E50;overflow:hidden;position:relative};min-height:1440px;height:1440px;justify-content:space-between;
/* Red danger glow top-left */
body::before{content:'';position:absolute;top:-150px;left:-150px;width:700px;height:700px;background:radial-gradient(ellipse,rgba(244,67,54,.18) 0%,transparent 70%);pointer-events:none}
/* Blue cold glow bottom-right */
body::after{content:'';position:absolute;bottom:-200px;right:-200px;width:600px;height:600px;background:radial-gradient(ellipse,rgba(33,150,243,.15) 0%,transparent 70%);pointer-events:none}
.wrap{padding:36px 40px 24px 40px;position:relative;z-index:1}
h2{font-size:70px;font-weight:900;text-shadow:4px 4px 0 rgba(0,0,0,.1),8px 8px 0 rgba(0,0,0,.05)}
.sub{font-size:34px;color:#7F8C8D;margin-bottom:16px}
.txt{font-size:38px;line-height:1.5}
.sm{font-size:36px;color:#7F8C8D}
.card{background:#fff;border-radius:28px;padding:28px 40px;margin:14px 0;position:relative;
  box-shadow:0 10px 30px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.08),inset 0 1px 0 rgba(255,255,255,.8);
  border:1px solid rgba(0,0,0,.04);transform:perspective(600px) rotateY(-2deg);transition:transform .3s ease}
.card::before{content:'';position:absolute;top:0;left:24px;right:24px;height:2px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.9),transparent)}
.highlight{color:#F44336;font-weight:bold}
.green{color:#4CAF50;font-weight:bold}
svg text{font-family:'PingFang SC','Microsoft YaHei',sans-serif}
.foot{position:fixed;bottom:28px;left:0;right:0;text-align:center;font-size:24px;color:#7F8C8D;z-index:10}

/* SVG diagram with depth */
.svg-stage{perspective:800px;margin-top:14px}
.svg-plane{transform:rotateX(8deg);box-shadow:0 15px 40px rgba(0,0,0,.15),0 5px 15px rgba(0,0,0,.1);border-radius:16px;overflow:hidden}

/* Quote block */
.quote{margin-top:14px;padding:22px 36px;border-radius:16px;border-left:4px solid #1565C0;position:relative;
  background:linear-gradient(135deg,#E3F2FD 0%,#F3E5F5 100%);
  box-shadow:0 10px 25px rgba(21,101,192,.12),0 2px 8px rgba(0,0,0,.08),inset 0 1px 0 rgba(255,255,255,.7);
  transform:perspective(600px) rotateY(-1.5deg)}
.quote::before{content:'';position:absolute;top:0;left:24px;right:24px;height:2px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.8),transparent)}

.flex-row{display:flex;gap:16px}
</style></head><body>
<div class="wrap">
  <h2>第三章：全面崩溃</h2>
  <div class="sub">爆发不是终点，冷冻才是……</div>

  <div class="flex-row">
    <div class="card" style="flex:1;border-top:4px solid #F44336;box-shadow:0 10px 30px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.08),inset 0 1px 0 rgba(255,255,255,.8),-4px 0 15px rgba(244,67,54,.3),-8px 0 30px rgba(244,67,54,.15)">
      <div class="txt" style="margin-bottom:6px"><span class="highlight">💥 爆发态</span></div>
      <div class="txt" style="line-height:1.55">
        语速加快<br>
        翻旧账（从去年开始）<br>
        摔门<br>
        "你永远都是这样！"
      </div>
    </div>
    <div class="card" style="flex:1;border-top:4px solid #1565C0;box-shadow:0 10px 30px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.08),inset 0 1px 0 rgba(255,255,255,.8),-4px 0 15px rgba(21,101,192,.3),-8px 0 30px rgba(21,101,192,.15)">
      <div class="txt" style="margin-bottom:6px;color:#1565C0;font-weight:bold">🧊 冷冻态</div>
      <div class="txt" style="line-height:1.55">
        不说话<br>
        分房睡<br>
        朋友圈伤感文案<br>
        "你开心就好"
      </div>
    </div>
  </div>

  <div class="card" style="text-align:center">
    <div class="txt">恢复难度 <span style="font-size:50px">⭐⭐⭐⭐⭐</span></div>
  </div>

  <div class="svg-stage">
    <div class="svg-plane">
      <svg width="952" height="120" viewBox="0 0 952 120">
        <defs>
          <marker id="ah6" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#F44336"/>
          </marker>
          <filter id="nodeShadow" x="-10%" y="-10%" width="120%" height="140%">
            <feDropShadow dx="3" dy="3" stdDeviation="3" flood-color="rgba(0,0,0,0.2)"/>
          </filter>
          <filter id="criticalGlow" x="-20%" y="-20%" width="140%" height="160%">
            <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="rgba(0,0,0,0.15)"/>
            <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="rgba(244,67,54,0.4)"/>
          </filter>
          <filter id="coldGlow" x="-20%" y="-20%" width="140%" height="160%">
            <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="rgba(0,0,0,0.15)"/>
            <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="rgba(33,150,243,0.35)"/>
          </filter>
        </defs>
        <g filter="url(#criticalGlow)">
          <rect x="40" y="20" width="180" height="80" rx="16" fill="#FFEBEE" stroke="#F44336" stroke-width="3"/>
        </g>
        <text x="130" y="68" text-anchor="middle" font-size="43" font-weight="bold" fill="#C62828">爆发态</text>
        <g filter="url(#coldGlow)">
          <rect x="732" y="20" width="180" height="80" rx="16" fill="#E3F2FD" stroke="#1565C0" stroke-width="3"/>
        </g>
        <text x="822" y="68" text-anchor="middle" font-size="43" font-weight="bold" fill="#1565C0">冷冻态</text>
        <line x1="220" y1="60" x2="732" y2="60" stroke="#F44336" stroke-width="2.5" marker-end="url(#ah6)"/>
        <rect x="386" y="36" width="180" height="28" rx="6" fill="rgba(255,255,255,0.85)"/>
        <text x="476" y="57" text-anchor="middle" font-size="32" fill="#F44336">❹ 无人劝阻</text>
      </svg>
    </div>
  </div>

  <div class="quote">
    <div class="txt" style="font-style:italic">"冷冻态不是冷静，是心寒。热量没了，就再也点不起来了。"</div>
  </div>
</div>
<div class="foot">6 / 9</div>
</body></html>
