<!DOCTYPE html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;background:#FFF9F0;font-family:'PingFang SC','Microsoft YaHei',sans-serif;color:#2C3E50;overflow:hidden;position:relative}
/* Warm ambient light top-left */
body::before{content:'';position:absolute;top:-200px;left:-200px;width:700px;height:700px;background:radial-gradient(ellipse,rgba(255,180,100,.2) 0%,transparent 70%);pointer-events:none}
/* Subtle dark bottom-right */
body::after{content:'';position:absolute;bottom:-200px;right:-200px;width:700px;height:700px;background:radial-gradient(ellipse,rgba(40,20,60,.15) 0%,transparent 70%);pointer-events:none}
.wrap{padding:60px 48px 48px 48px;position:relative;z-index:1;min-height:1440px}
h2{font-size:79px;font-weight:900;text-shadow:4px 4px 0 rgba(0,0,0,.1),8px 8px 0 rgba(0,0,0,.05)}
.sub{font-size:46px;color:#7F8C8D;margin-bottom:50px}
.txt{font-size:43px;line-height:1.75}
.sm{font-size:36px;color:#7F8C8D}
.card{background:#fff;border-radius:28px;padding:50px 57px;margin:36px 0;position:relative;
  box-shadow:0 10px 30px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.08),inset 0 1px 0 rgba(255,255,255,.8);
  border:1px solid rgba(0,0,0,.04);transform:perspective(600px) rotateY(-2deg);transition:transform .3s ease}
.card::before{content:'';position:absolute;top:0;left:24px;right:24px;height:2px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.9),transparent)}
.foot{position:static;padding-top:60px;font-size:32px;color:#7F8C8D}
.divider{height:2px;background:linear-gradient(90deg,transparent,#2C3E50,transparent);opacity:.15;margin:36px 0 32px}
.emoji-row{font-size:162px;text-align:center;margin:86px 0;filter:drop-shadow(0 20px 30px rgba(0,0,0,.15))}
</style></head><body>
<div class="wrap">
  <h2>🤔 为什么画这个</h2>
  <div class="divider"></div>
  <div class="txt" style="margin:43px 0">
    <p style="margin:25px 0">• 理工男职业病，看什么都想建模</p>
    <p style="margin:25px 0">• 老婆生气这件事，比任何系统都复杂</p>
    <p style="margin:25px 0">• 于是我决定认真分析一下</p>
  </div>
  <div class="emoji-row">👨‍💻　👩</div>
  <p class="sm" style="text-align:center;margin-top:-64px;margin-bottom:36px">（大概是这个感觉）</p>
  <div class="card">
    <p class="txt" style="text-align:center">"建模是理工男最后的倔强<br>——虽然模型跑出来自己也看不懂"</p>
  </div>
</div>
<div class="foot">Page 2 / 9 · 3D Enhanced</div>
</body></html>
