<!DOCTYPE html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;flex-direction:column;align-items:center;min-height:1440px;height:1440px;justify-content:space-between;width:1080px;background:#FFF9F0;font-family:'PingFang SC','Microsoft YaHei',sans-serif;color:#2C3E50;overflow:hidden;position:relative};min-height:1440px;height:1440px;justify-content:space-between;
/* Green recovery glow top-left */
body::before{content:'';position:absolute;top:-150px;left:-150px;width:700px;height:700px;background:radial-gradient(ellipse,rgba(76,175,80,.18) 0%,transparent 70%);pointer-events:none}
/* Warm light bottom-right */
body::after{content:'';position:absolute;bottom:-200px;right:-200px;width:600px;height:600px;background:radial-gradient(ellipse,rgba(255,200,100,.15) 0%,transparent 70%);pointer-events:none}
.wrap{padding:36px 40px 24px 40px;position:relative;z-index:1}
h2{font-size:70px;font-weight:900;text-shadow:4px 4px 0 rgba(0,0,0,.1),8px 8px 0 rgba(0,0,0,.05)}
.sub{font-size:34px;color:#7F8C8D;margin-bottom:16px}
.txt{font-size:38px;line-height:1.5}
.sm{font-size:36px;color:#7F8C8D}
.card{background:#fff;border-radius:28px;padding:28px 40px;margin:14px 0;position:relative;
  box-shadow:0 10px 30px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.08),inset 0 1px 0 rgba(255,255,255,.8);
  border:1px solid rgba(0,0,0,.04);transform:perspective(600px) rotateY(-2deg);transition:transform .3s ease}
.card::before{content:'';position:absolute;top:0;left:24px;right:24px;height:2px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.9),transparent)}
.highlight{color:#F44336;font-weight:bold}
.green{color:#4CAF50;font-weight:bold}
svg text{font-family:'PingFang SC','Microsoft YaHei',sans-serif}
.foot{position:fixed;bottom:28px;left:0;right:0;text-align:center;font-size:24px;color:#7F8C8D;z-index:10}

/* SVG diagram with depth */
.svg-stage{perspective:800px;margin-top:14px;margin-bottom:24px}
.svg-plane{transform:rotateX(8deg);box-shadow:0 15px 40px rgba(0,0,0,.15),0 5px 15px rgba(0,0,0,.1);border-radius:16px;overflow:hidden}

/* Hero banner */
.hero-banner{text-align:center;padding:36px;background:linear-gradient(135deg,#E8F5E9,#C8E6C9);border-radius:28px;margin-bottom:16px;position:relative;
  box-shadow:0 15px 40px rgba(76,175,80,.2),0 5px 15px rgba(0,0,0,.1),inset 0 1px 0 rgba(255,255,255,.8)}
.hero-banner::before{content:'';position:absolute;top:0;left:24px;right:24px;height:2px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.9),transparent)}

/* Quote block */
.quote{padding:22px 36px;border-radius:16px;border-left:4px solid #003057;position:relative;
  background:#F5F5F5;
  box-shadow:0 10px 25px rgba(0,0,0,.1),0 2px 8px rgba(0,0,0,.08),inset 0 1px 0 rgba(255,255,255,.7);
  transform:perspective(600px) rotateY(-1.5deg)}
.quote::before{content:'';position:absolute;top:0;left:24px;right:24px;height:2px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.8),transparent)}

.flex-row{display:flex;gap:28px}
</style></head><body>
<div class="wrap">
  <h2>终章：唯一的修复方案</h2>
  <div class="sub">三条路，只有一条是对的</div>

  <div class="flex-row" style="margin-bottom:28px">
    <div class="card" style="flex:1;border-top:3px solid #1565C0;box-shadow:0 10px 30px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.08),inset 0 1px 0 rgba(255,255,255,.8),-4px 0 15px rgba(21,101,192,.25),-8px 0 30px rgba(21,101,192,.12)">
      <div class="txt" style="color:#1565C0;font-weight:bold;margin-bottom:6px;font-size:34px">❶ 冷冻态恢复</div>
      <div class="sm" style="line-height:1.55;font-size:30px">
        靠时间慢慢融化<br>
        <span class="highlight">但有后遗症</span><br>
        信任裂痕永久留存
      </div>
    </div>
    <div class="card" style="flex:1;border-top:3px solid #9C27B0;box-shadow:0 10px 30px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.08),inset 0 1px 0 rgba(255,255,255,.8),-4px 0 15px rgba(156,39,176,.25),-8px 0 30px rgba(156,39,176,.12)">
      <div class="txt" style="color:#9C27B0;font-weight:bold;margin-bottom:6px;font-size:34px">❷ 阴天态假恢复</div>
      <div class="sm" style="line-height:1.55;font-size:30px">
        反复循环<br>
        <span class="highlight">越闹越凶</span><br>
        能量持续消耗
      </div>
    </div>
    <div class="card" style="flex:1;border-top:3px solid #4CAF50;background:#F1F8E9;box-shadow:0 10px 30px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.08),inset 0 1px 0 rgba(255,255,255,.8),-4px 0 15px rgba(76,175,80,.35),-8px 0 30px rgba(76,175,80,.18)">
      <div class="txt green" style="margin-bottom:6px;font-size:34px">✅ ❽ 正确出口</div>
      <div class="sm" style="line-height:1.55;font-size:30px">
        认真听她说话<br>
        <span class="green">情绪被看见</span><br>
        一次性修复
      </div>
    </div>
  </div>

  <div class="hero-banner">
    <div style="font-size:64px;font-weight:900;color:#2E7D32;letter-spacing:3px">"认真听她说话"</div>
  </div>

  <div class="svg-stage">
    <div class="svg-plane">
      <svg width="952" height="140" viewBox="0 0 952 140">
        <defs>
          <marker id="ah8g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#4CAF50"/>
          </marker>
          <marker id="ah8b" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#9E9E9E"/>
          </marker>
          <filter id="nodeShadow" x="-10%" y="-10%" width="120%" height="140%">
            <feDropShadow dx="3" dy="3" stdDeviation="3" flood-color="rgba(0,0,0,0.2)"/>
          </filter>
          <filter id="recoveryGlow" x="-20%" y="-20%" width="140%" height="160%">
            <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="rgba(0,0,0,0.15)"/>
            <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="rgba(76,175,80,0.4)"/>
          </filter>
        </defs>
        <g filter="url(#nodeShadow)">
          <rect x="40" y="10" width="160" height="50" rx="12" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
        </g>
        <text x="120" y="42" text-anchor="middle" font-size="36" font-weight="bold" fill="#1565C0">冷冻态</text>
        <g filter="url(#nodeShadow)">
          <rect x="40" y="65" width="160" height="50" rx="12" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/>
        </g>
        <text x="120" y="97" text-anchor="middle" font-size="36" font-weight="bold" fill="#9C27B0">阴天态</text>
        <g filter="url(#recoveryGlow)">
          <rect x="752" y="32" width="160" height="60" rx="16" fill="#E8F5E9" stroke="#4CAF50" stroke-width="3"/>
        </g>
        <text x="832" y="70" text-anchor="middle" font-size="43" font-weight="bold" fill="#2E7D32">平静态</text>
        <!-- ❼ 冷冻→平静 -->
        <line x1="200" y1="35" x2="752" y2="52" stroke="#9E9E9E" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#ah8b)"/>
        <rect x="410" y="26" width="140" height="24" rx="5" fill="rgba(255,255,255,0.85)"/>
        <text x="480" y="44" text-anchor="middle" font-size="28" fill="#9E9E9E">❼ 自行恢复</text>
        <!-- 阴天→平静 -->
        <line x1="200" y1="90" x2="752" y2="72" stroke="#9E9E9E" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#ah8b)"/>
        <rect x="405" y="68" width="150" height="24" rx="5" fill="rgba(255,255,255,0.85)"/>
        <text x="480" y="86" text-anchor="middle" font-size="28" fill="#9E9E9E">反复循环 ↻</text>
        <!-- ❽ 绿色高亮路径 -->
        <line x1="200" y1="90" x2="752" y2="62" stroke="#4CAF50" stroke-width="3.5" marker-end="url(#ah8g)"/>
        <rect x="405" y="120" width="150" height="28" rx="6" fill="rgba(255,255,255,0.9)" stroke="#4CAF50" stroke-width="1.5"/>
        <text x="480" y="140" text-anchor="middle" font-size="32" fill="#2E7D32" font-weight="bold">✅ ❽ 认真哄好了</text>
        <line x1="480" y1="120" x2="480" y2="90" stroke="#4CAF50" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
      </svg>
    </div>
  </div>

  <div class="quote">
    <div class="sm" style="color:#666;margin-bottom:6px">🚗 沃尔沃汽车：</div>
    <div class="txt" style="font-size:33px;color:#444">"能预警碰撞，预警不了'我没事'。<br>安全不只是技术，也是一种态度。"</div>
  </div>
</div>
<div class="foot">8 / 9</div>
<p style="position:fixed;bottom:28px;left:40px;font-size:24px;color:#7F8C8D;opacity:.4;z-index:10">© 架构活了@小红书</p>
</body></html>
