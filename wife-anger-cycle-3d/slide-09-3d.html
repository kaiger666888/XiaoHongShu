<!DOCTYPE html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1440px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);color:#fff;font-family:'PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden;position:relative}
/* Warm ambient glow for dark bg */
body::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:800px;height:800px;background:radial-gradient(ellipse,rgba(255,180,100,.12) 0%,rgba(255,100,50,.06) 40%,transparent 70%);pointer-events:none}
/* Subtle cool accent */
body::after{content:'';position:absolute;bottom:-200px;right:-200px;width:600px;height:600px;background:radial-gradient(ellipse,rgba(100,150,255,.08) 0%,transparent 70%);pointer-events:none}
</style></head><body style="padding:80px 48px 30px 48px">

  </div>
  <p style="margin-top:60px;text-align:center;position:relative;z-index:1">

    <span style="display:block;font-size:42px;font-weight:300;margin-top:24px;text-shadow:2px 2px 0 rgba(0,0,0,.15),4px 4px 0 rgba(0,0,0,.08)">从认真倾听身边人开始</span>
  </p>

<p style="position:fixed;bottom:28px;left:40px;font-size:24px;color:#7F8C8D;opacity:.4;z-index:10">© 架构活了@小红书</p>
